<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitPulse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>HabitPulse</h1>
            <p>Track your daily progress and view yearly insights</p>
        </header>

        <div class="add-habit-container">
            <input type="text" id="habitName" placeholder="Enter new habit...">
            <button id="addHabitBtn" type="button">Add Habit</button>
        </div>

        <div id="habitsList" class="habits-list">
            <!-- Habits will be rendered here dynamically -->
        </div>
    </div>
</body>
</html>
